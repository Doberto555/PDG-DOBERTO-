<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PDG DOBERTO LLC - Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
    }

    header {
      position: fixed;
      width: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
      padding: 20px;
      z-index: 10;
    }

    header h1 {
      margin: 0;
      color: red;
    }

    .hero {
      height: 90vh;
      background: url(https://files.catbox.moe/49p71o.jpg) center/cover;
      display: flex;
      align-items: center;
      padding: 50px;
    }

    .hero-text {
      max-width: 500px;
    }

    .hero h2 {
      font-size: 50px;
    }

    .btn {
      padding: 10px 20px;
      background: red;
      border: none;
      color: white;
      margin-top: 10px;
      cursor: pointer;
    }

    section {
      padding: 40px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .scroll {
      display: flex;
      overflow-x: auto;
      gap: 15px;
    }

    .card {
      min-width: 250px;
      height: 150px;
      background: #111;
      border-radius: 10px;
      padding: 15px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.1);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
    }
  </style>
</head>

<body>

<header>
  <h1>PDG DOBERTO LLC</h1>
</header>

<div class="hero">
  <div class="hero-text">
    <h2>Bienvenue 👑</h2>
    <p>Découvre mes projets comme sur Netflix 🔥</p>
    <button class="btn" onclick="window.location='#projects'">Voir les projets</button>
  </div>
</div>

<section id="projects">
  <h2>🔥 Mes Projets</h2>
  <div class="scroll">

    <div class="card">
      <h3>Projet 1</h3>
      <p>Ton projet ici</p>
    </div>

    <div class="card">
      <h3>Projet 2</h3>
      <p>Ton projet ici</p>
    </div>

    <div class="card">
      <h3>Projet 3</h3>
      <p>Ton projet ici</p>
    </div>

    <div class="card">
      <h3>Projet 4</h3>
      <p>Ton projet ici</p>
    </div>

  </div>
</section>

<section>
  <h2>📞 Contact</h2>
  <p>WhatsApp : +1 289 481 0858</p>
  <button class="btn" onclick="window.open('https://wa.me/12894810858')">Me contacter</button>
</section>

<footer>
  <p>© 2026 PDG DOBERTO LLC</p>
</footer>

</body>
</html>
